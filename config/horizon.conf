# Idle timeout before keyboard enters idle state (in milliseconds)
# 30000ms = 30 seconds of inactivity before entering idle mode
CONFIG_ZMK_IDLE_TIMEOUT=30000

# Enable sleep mode to save battery when keyboard is not in use
# y = enabled, n = disabled
CONFIG_ZMK_SLEEP=y

# Time before entering deep sleep mode (in milliseconds)
# 900000ms = 15 minutes of inactivity before deep sleep
# Deep sleep significantly reduces power consumption
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Enable soft off feature for power management
# Allows the keyboard to be turned off via a key binding and woken up with a button press
# y = enabled, n = disabled
CONFIG_ZMK_PM_SOFT_OFF=y

# Enable mouse emulation/pointing device support
# Required for mouse button presses (&mkp) and scroll wheel (&msc) behaviors
# Note: Enabling this modifies the HID report descriptor and may require re-pairing Bluetooth
# y = enabled, n = disabled
CONFIG_ZMK_POINTING=y

# Increase Bluetooth TX power for better range
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Better Bluetooth connection stability
# CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
 
# Increase combo term for easier activation (if you add combos)
# CONFIG_ZMK_COMBO_MAX_COMBOS_PER_KEY=16